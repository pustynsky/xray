name: Clippy

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  clippy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Run clippy
        run: cargo clippy --workspace -- -D warnings

