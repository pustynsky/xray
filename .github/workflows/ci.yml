name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    name: Clippy (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo clippy --workspace --all-targets
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Tests in src/git/* and src/mcp/handlers/git_handler_tests.rs run
          # against the actual workspace repo (`.`) and require full history
          # (HEAD~1, file_history, branch detection). Default shallow clone
          # (fetch-depth: 1) leaves the working copy in detached HEAD with no
          # parent commits, so those tests fail in CI but pass locally.
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --workspace --locked
        run: cargo test --workspace --locked

  feature-matrix:
    name: Feature matrix (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""
          - "--all-features"
          - "--no-default-features"
          - "--no-default-features --features lang-csharp"
          - "--no-default-features --features lang-typescript"
          - "--no-default-features --features lang-rust"
          - "--no-default-features --features lang-xml"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: feature-matrix
      # `cargo check` instead of `cargo test` keeps the matrix fast enough for
      # every push. Full test runs across the matrix are too slow (~N× the
      # default test job); the base `test` job already covers functional
      # correctness under default features.
      - name: cargo check ${{ matrix.features }}
        run: cargo check --workspace ${{ matrix.features }} --locked

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: audit
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: cargo audit --deny warnings
        # RUSTSEC-2025-0141 (bincode 1.3.3 unmaintained) is tracked as MAJOR-10.
        # Migration to bincode 2 or postcard requires a breaking on-disk format bump
        # and is scheduled as a separate user story.
        run: cargo audit --deny warnings --ignore RUSTSEC-2025-0141

  deny:
    name: cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

